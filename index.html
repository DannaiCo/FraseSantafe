<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Día de la Independencia</title>
  <link href="https://use.typekit.net/ymy7tce.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;   /* 👈 usamos viewport en lugar de px */
      height: 100vh;
      font-family: "kit-rounded", sans-serif;
      font-style: normal;
    }

    .contenedor {
      position: relative;
      width: 100vw;   /* 👈 siempre ocupar toda la pantalla */
      height: 100vh;
    }

    video#fondoVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 👈 mejor que fill: mantiene proporción y llena */
      z-index: 0;
    }

    .frase {
      position: absolute;
      top: 59%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 1548px;
      text-align: center;
      font-size: 150px;
      line-height: 1.1;
      font-weight: 800;
      color: #ffe4f3;
      font-family: "kit-rounded", sans-serif;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    .mostrar {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <video autoplay muted loop playsinline id="fondoVideo">
      <source src="fondo.mp4" type="video/mp4">
      Cargando.
    </video>

    <div class="frase" id="frase"></div>
  </div>

<script>
  const url = "https://script.google.com/macros/s/AKfycbwK3DXDqx6aEjekLihmQMxB3B1Yi7vVb2LrOKgIyvJ7m80aFuBH7btQ0ozN_HCdWGr8ag/exec";

  fetch(url)
    .then(res => res.json())
    .then(data => {
      const frases = data.mensajes;
      const el = document.getElementById("frase");

      function mostrarFrase() {
        const aleatoria = frases[Math.floor(Math.random() * frases.length)];
        let texto = aleatoria.toLowerCase();
        el.innerText = texto.charAt(0).toUpperCase() + texto.slice(1);
        el.classList.add("mostrar");
      }

      mostrarFrase();

      setInterval(() => {
        el.classList.remove("mostrar");
        setTimeout(mostrarFrase, 500);
      }, 5000);
    })
    .catch(err => {
      console.error("Error cargando frases:", err);
      document.getElementById("frase").innerText = "Error al cargar frase";
    });
</script>
</body>
</html>
