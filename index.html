<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Día de la Independencia</title>
  <link href="https://use.typekit.net/ymy7tce.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;   /* 👈 usamos viewport en lugar de px */
      height: 100vh;
      font-family: "kit-rounded", sans-serif;
      font-style: normal;
    }

    .contenedor {
      position: relative;
      width: 100vw;   /* 👈 siempre ocupar toda la pantalla */
      height: 100vh;
    }

    video#fondoVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 👈 mejor que fill: mantiene proporción y llena */
      z-index: 0;
    }

    .nombre{
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:120px;
  font-weight:800;
  color:#ffffff;
  opacity:0;
  transition:opacity 0.3s ease-in-out;
}

.mensaje{
  position:absolute;
  top:60%;
  left:50%;
  transform:translate(-50%, -50%);
  width:80%;
  text-align:center;
  font-size:150px;
  font-weight:800;
  color:#ffe4f3;
  opacity:0;
  transition:opacity 0.3s ease-in-out;
}

    .mostrar {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <video autoplay muted loop playsinline id="fondoVideo">
      <source src="fondo.mp4" type="video/mp4">
      Cargando.
    </video>

    <div class="nombre" id="nombre"></div>
<div class="mensaje" id="mensaje"></div>
  </div>

<script>
  cconst url = "https://script.google.com/macros/s/AKfycbwK3DXDqx6aEjekLihmQMxB3B1Yi7vVb2LrOKgIyvJ7m80aFuBH7btQ0ozN_HCdWGr8ag/exec";

fetch(url)
.then(res => res.json())
.then(data => {

  const mensajes = data;

  const nombreEl = document.getElementById("nombre");
  const mensajeEl = document.getElementById("mensaje");

  function mostrarMensaje(){

    const aleatorio = mensajes[Math.floor(Math.random() * mensajes.length)];

    nombreEl.innerText = aleatorio.nombre;
    mensajeEl.innerText = aleatorio.mensaje;

    nombreEl.classList.add("mostrar");
    mensajeEl.classList.add("mostrar");
  }

  mostrarMensaje();

  setInterval(()=>{

    nombreEl.classList.remove("mostrar");
    mensajeEl.classList.remove("mostrar");

    setTimeout(mostrarMensaje,500);

  },5000);

})
.catch(err=>{
  console.error("Error:",err);
});
   
</script>
</body>
</html>
